<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МЭЛСТРОЙ СЛОТЫ VIP</title>
    <style>
        body {
            font-family: monospace;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000;
            color: #fff;
        }
        .container {
            background-color: rgba(0, 0, 0, 0.85); 
            border: 2px solid #fff;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            text-align: center;
        }
        h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            border-bottom: 2px solid #fff;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid #fff;
            padding: 10px;
        }
        .music-btn {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            padding: 5px 10px;
            font-family: monospace;
            cursor: pointer;
            text-transform: uppercase;
        }
        .slots-box {
            display: flex;
            justify-content: space-between;
            margin: 30px 0;
            padding: 10px;
            border: 2px solid #fff;
            background: rgba(255, 255, 255, 0.1);
        }
        .slot {
            width: 32%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slot img {
            width: 100%;
            height: 120px; 
            object-fit: cover;
            border: 1px solid #555;
        }
        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            text-transform: uppercase;
            text-align: left;
        }
        input {
            width: 100%;
            padding: 10px;
            background-color: transparent;
            border: 1px solid #fff;
            color: #fff;
            font-family: monospace;
            box-sizing: border-box;
            font-size: 1.2rem;
            text-align: center;
        }
        button.spin-btn {
            width: 100%;
            background-color: #fff;
            color: #000;
            font-family: monospace;
            font-size: 1.5rem;
            text-transform: uppercase;
            padding: 15px;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border: 1px dashed #fff;
            text-align: center;
            min-height: 40px;
            white-space: pre-line;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <h1>МЭЛСТРОЙ СЛОТЫ VIP</h1>
    
    <div class="controls-row">
        <div>БАЛАНС: <span id="balance" style="font-weight:bold; font-size:1.2rem;">1000</span></div>
        <button id="musicToggle" class="music-btn" onclick="toggleMusic()">МУЗЫКА: OFF</button>
    </div>

    <div class="slots-box">
        <div class="slot"><img id="slot1" src="1.jpg"></div>
        <div class="slot"><img id="slot2" src="2.jpg"></div>
        <div class="slot"><img id="slot3" src="3.jpg"></div>
    </div>

    <label for="betAmount">СУММА СТАВКИ:</label>
    <input type="number" id="betAmount" min="1" value="100">

    <button class="spin-btn" id="spinBtn" onclick="spinSlots()">ДЕРНУТЬ РУЧКУ</button>

    <div class="result-box" id="resultDisplay">
        НАЖМИ В ЛЮБОЕ МЕСТО ДЛЯ МУЗЫКИ
    </div>
</div>

<script>
    let balance = 1000;
    let isSpinning = false;
    const images = ['1.jpg', '2.jpg', '3.jpg', '4.jpg'];
    
    const audio = document.getElementById("bgMusic");
    const musicBtn = document.getElementById("musicToggle");
    let isMusicPlaying = false;

    // ФУНКЦИЯ АВТОВКЛЮЧЕНИЯ
    function startMusic() {
        if (!isMusicPlaying) {
            audio.volume = 0.5;
            audio.play().then(() => {
                isMusicPlaying = true;
                musicBtn.innerText = "МУЗЫКА: ON";
            }).catch(e => console.log("Ждем взаимодействия..."));
        }
    }

    // Слушаем первый клик по всей странице
    document.addEventListener('click', startMusic, { once: true });
    // На случай если пользователь сразу нажмет "Крутить"
    document.getElementById('spinBtn').addEventListener('click', startMusic);

    function toggleMusic() {
        if (isMusicPlaying) {
            audio.pause();
            musicBtn.innerText = "МУЗЫКА: OFF";
        } else {
            audio.play();
            musicBtn.innerText = "МУЗЫКА: ON";
        }
        isMusicPlaying = !isMusicPlaying;
    }

    function spinSlots() {
        if (isSpinning) return;
        const betAmount = parseInt(document.getElementById("betAmount").value, 10);
        const resultDisplay = document.getElementById("resultDisplay");
        const balanceDisplay = document.getElementById("balance");
        const spinBtn = document.getElementById("spinBtn");

        if (isNaN(betAmount) || betAmount <= 0 || betAmount > balance) {
            resultDisplay.innerText = "ОШИБКА СТАВКИ";
            return;
        }

        balance -= betAmount;
        balanceDisplay.innerText = balance;
        resultDisplay.innerText = "КРУТИМ...";
        isSpinning = true;
        spinBtn.disabled = true;

        const img1 = document.getElementById("slot1");
        const img2 = document.getElementById("slot2");
        const img3 = document.getElementById("slot3");

        let ticks = 0;
        const interval = setInterval(() => {
            img1.src = images[Math.floor(Math.random() * images.length)];
            img2.src = images[Math.floor(Math.random() * images.length)];
            img3.src = images[Math.floor(Math.random() * images.length)];
            ticks++;
            if (ticks >= 20) {
                clearInterval(interval);
                const final1 = images[Math.floor(Math.random() * images.length)];
                const final2 = images[Math.floor(Math.random() * images.length)];
                const final3 = images[Math.floor(Math.random() * images.length)];
                img1.src = final1; img2.src = final2; img3.src = final3;
                checkWin(final1, final2, final3, betAmount);
                isSpinning = false;
                spinBtn.disabled = false;
            }
        }, 50);
    }

    function checkWin(img1, img2, img3, bet) {
        let payout = 0;
        if (img1 === img2 && img2 === img3) payout = bet * 10;
        else if (img1 === img2 || img2 === img3 || img1 === img3) payout = bet * 2;
        
        if (payout > 0) {
            balance += payout;
            document.getElementById("resultDisplay").innerText = `ВЫИГРЫШ: +${payout}`;
        } else {
            document.getElementById("resultDisplay").innerText = "ПРОИГРЫШ";
        }
        document.getElementById("balance").innerText = balance;
    }
</script>
</body>
</html>
